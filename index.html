<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术资源下载合集 - 浮生技术小站</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="shell header-layout">
            <div class="brand-block">
                <p class="eyebrow" id="site-eyebrow">Resource Hub</p>
                <h1 id="site-title">技术资源下载合集</h1>
                <p class="site-description" id="site-description">常用工具、插件和安装包的统一下载入口。</p>
            </div>
            <div class="meta-panel" id="site-meta" aria-label="站点信息"></div>
        </div>
    </header>

    <main class="shell">
        <section class="toolbar" aria-label="资源筛选">
            <label class="search-box">
                <span>搜索</span>
                <input id="resource-search" type="search" placeholder="输入名称、说明或标签" autocomplete="off">
            </label>
            <div class="filter-tabs" id="category-tabs"></div>
        </section>

        <section class="content-section">
            <div class="section-heading">
                <div>
                    <p class="section-kicker">Downloads</p>
                    <h2>资源列表</h2>
                </div>
                <p class="result-count" id="result-count"></p>
            </div>
            <div class="resource-list" id="resource-list"></div>
            <div class="empty-state" id="empty-state" hidden>
                <h3>没有找到匹配资源</h3>
                <p>换个关键词或分类试试。</p>
            </div>
        </section>

        <section class="content-section" id="notice-section" hidden>
            <div class="section-heading">
                <div>
                    <p class="section-kicker">Notice</p>
                    <h2 id="notice-title"></h2>
                </div>
            </div>
            <div class="notice-card">
                <div class="notice-copy">
                    <p id="notice-description"></p>
                </div>
                <div class="notice-image" id="notice-image-wrap" hidden>
                    <img id="notice-image" src="" alt="">
                    <p id="notice-image-label"></p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="shell footer-layout">
            <span id="footer-brand">浮生技术小站</span>
            <span id="footer-text">专注于高质量原创项目分享</span>
        </div>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
